<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamsMentionExtractor</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica,
          Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: #1f2328;
        background-color: #ffffff;
        margin: 0;
        padding: 24px 16px 48px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
      }

      /* ── Header ── */
      .page-header {
        padding-bottom: 16px;
        margin-bottom: 16px;
        border-bottom: 1px solid #d0d7de;
      }

      .page-header h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0 0 0px;
        color: #1f2328;
      }

      .page-header p {
        margin: 0;
        color: #656d76;
        font-size: 14px;
      }

      /* ── How-to list ── */
      .how-to {
        margin: 4px 0 12px;
        padding-left: 24px;
        color: #656d76;
        font-size: 13px;
      }

      .how-to li {
        margin-bottom: 4px;
      }

      .how-to li:last-child {
        margin-bottom: 0;
      }

      /* ── Button ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid rgba(31, 35, 40, 0.15);
        background-color: #f6f8fa;
        color: #24292f;
        transition:
          background-color 0.1s ease,
          border-color 0.1s ease;
        user-select: none;
        white-space: nowrap;
      }

      .btn:hover {
        background-color: #eef1f4;
        border-color: rgba(31, 35, 40, 0.3);
      }

      .btn:active {
        background-color: #e7ebf0;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-primary {
        background-color: #1f883d;
        border-color: rgba(31, 35, 40, 0.15);
        color: #ffffff;
      }

      .btn-primary:hover {
        background-color: #1a7f37;
      }

      .btn-primary:active {
        background-color: #187733;
      }

      /* ── Section heading ── */
      .section-heading {
        font-size: 14px;
        font-weight: 600;
        color: #1f2328;
        margin: 20px 0 8px;
      }

      /* ── Textarea ── */
      textarea {
        display: block;
        width: 100%;
        padding: 8px 12px;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #1f2328;
        background-color: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        resize: vertical;
        height: 100px;
        outline: none;
        transition:
          border-color 0.1s ease,
          box-shadow 0.1s ease;
      }

      textarea:focus {
        background-color: #ffffff;
        border-color: #0969da;
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
      }

      /* ── Result empty / error ── */
      .result-empty {
        color: #656d76;
        font-size: 13px;
        padding: 12px 0;
      }

      /* ── Card ── */
      .card {
        margin-top: 12px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        overflow: hidden;
        background-color: #ffffff;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background-color: #f6f8fa;
        border-bottom: 1px solid #d0d7de;
        font-weight: 600;
        font-size: 13px;
        color: #1f2328;
      }

      .card-header .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        font-size: 11px;
        font-weight: 600;
        color: #ffffff;
        background-color: #0969da;
        border-radius: 10px;
      }

      .card-body {
        padding: 12px 16px;
      }

      /* ── Row ── */
      .row {
        display: grid;
        grid-template-columns: 120px 1fr;
        align-items: baseline;
        gap: 4px 8px;
        padding: 4px 0;
      }

      .row + .row {
        border-top: 1px solid #f0f2f4;
      }

      .row-indent {
        grid-template-columns: 100px 1fr;
        margin-left: 20px;
      }

      .row-indent + .row-indent {
        border-top: 1px solid #f0f2f4;
      }

      .label {
        font-size: 11px;
        font-weight: 600;
        color: #656d76;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding-top: 2px;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
      }

      .value {
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
        color: #1f2328;
        cursor: pointer;
        padding: 2px 6px;
        border-radius: 4px;
        display: inline-block;
        transition: background-color 0.1s ease;
        word-break: break-all;
      }

      .value:hover {
        background-color: #eef1f4;
        color: #0969da;
      }

      .value-emphasis {
        font-weight: 600;
        color: #0969da;
      }

      .value-emphasis:hover {
        background-color: #ddeeff;
      }

      .copied {
        background-color: #dafbe1 !important;
        color: #1a7f37 !important;
      }

      /* ── Copy hint ── */
      .copy-hint {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #656d76;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #d0d7de;
      }

      .copy-hint svg {
        flex-shrink: 0;
      }

      /* ── Divider between mri block ── */
      .mri-block {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px dashed #d0d7de;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1>TeamsMentionExtractor</h1>
        <p>
          Teams メンションの HTML から aria-label / type / mri
          属性を抽出します。
        </p>
      </div>

      <div class="section-heading">使い方</div>
      <ol class="how-to">
        <li>
          Teams
          アプリでメンションを含むテキストを作成し、クリップボードにコピーする
        </li>
        <li>「クリップボードを解析」を押下する</li>
      </ol>

      <button id="readBtn" class="btn btn-primary">
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"
          />
          <path
            d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"
          />
        </svg>
        クリップボードを解析
      </button>

      <div class="section-heading">クリップボードから取得した HTML ソース</div>
      <textarea
        id="rawHtml"
        readonly
        placeholder="ボタンを押下すると、ここにクリップボードから取得した HTML が表示されます。"
      ></textarea>

      <div class="section-heading">
        MRI (Message Routing Identifier) 抽出結果
      </div>
      <div id="result"></div>

      <div id="note" hidden>
        <div class="copy-hint">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="#656d76"
            aria-hidden="true"
          >
            <path
              d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"
            />
          </svg>
          各値はクリックでクリップボードにコピーされます
        </div>
      </div>
    </div>

    <script>
      const rawHtmlEl = document.getElementById("rawHtml");
      const resultEl = document.getElementById("result");
      const noteEl = document.getElementById("note");

      function parseMRI(mri) {
        if (!mri) return { raw: "", prefix: "", id_type: "", id: "" };
        const parts = mri.split(":");
        return {
          raw: mri,
          prefix: parts[0] || "",
          id_type: parts[1] || "",
          id: parts.slice(2).join(":") || "",
        };
      }

      function extract(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const mentions = doc.querySelectorAll("mention");
        return Array.from(mentions).map((m, i) => {
          const mri = m.getAttribute("mri") || "";
          return {
            index: i + 1,
            ariaLabel: m.getAttribute("aria-label") || "",
            type: m.getAttribute("type") || "",
            mri: parseMRI(mri),
          };
        });
      }

      function createRow(label, value, emphasis = false, indent = false) {
        const row = document.createElement("div");
        row.className = indent ? "row row-indent" : "row";

        const labelEl = document.createElement("div");
        labelEl.className = "label";
        labelEl.textContent = label;

        const valueEl = document.createElement("div");
        valueEl.className = emphasis ? "value value-emphasis" : "value";
        valueEl.textContent = value || "";
        valueEl.title = "クリックしてコピー";

        valueEl.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(value || "");
            const prev = valueEl.textContent;
            valueEl.classList.add("copied");
            setTimeout(() => valueEl.classList.remove("copied"), 600);
          } catch (e) {
            const prev = valueEl.textContent;
            valueEl.textContent = "コピー失敗";
            setTimeout(() => (valueEl.textContent = prev), 1500);
          }
        });

        row.appendChild(labelEl);
        row.appendChild(valueEl);
        return row;
      }

      function render(items) {
        resultEl.innerHTML = "";

        if (!items.length) {
          noteEl.hidden = true;
          const empty = document.createElement("div");
          empty.className = "result-empty";
          empty.textContent = "mention が見つかりませんでした";
          resultEl.appendChild(empty);
          return;
        }

        noteEl.hidden = false;

        items.forEach((item) => {
          const card = document.createElement("div");
          card.className = "card";

          const header = document.createElement("div");
          header.className = "card-header";
          const badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = item.index;
          header.appendChild(badge);
          header.appendChild(
            document.createTextNode(item.ariaLabel || "（名前なし）"),
          );
          card.appendChild(header);

          const body = document.createElement("div");
          body.className = "card-body";

          body.appendChild(createRow("aria-label", item.ariaLabel));
          body.appendChild(createRow("type", item.type));
          body.appendChild(createRow("mri", item.mri.raw));

          const mriBlock = document.createElement("div");
          mriBlock.className = "mri-block";
          mriBlock.appendChild(
            createRow("prefix", item.mri.prefix, false, true),
          );
          mriBlock.appendChild(
            createRow("id_type", item.mri.id_type, false, true),
          );
          mriBlock.appendChild(createRow("id", item.mri.id, true, true));
          body.appendChild(mriBlock);

          card.appendChild(body);
          resultEl.appendChild(card);
        });
      }

      async function readClipboardHtml() {
        rawHtmlEl.value = "";
        resultEl.innerHTML = "";
        noteEl.hidden = true;

        const btn = document.getElementById("readBtn");
        btn.disabled = true;
        try {
          const items = await navigator.clipboard.read();
          let html = null;

          for (const item of items) {
            if (item.types.includes("text/html")) {
              const blob = await item.getType("text/html");
              html = await blob.text();
              break;
            }
          }

          if (!html) {
            const empty = document.createElement("div");
            empty.className = "result-empty";
            empty.textContent = "text/html が見つかりませんでした";
            resultEl.appendChild(empty);
            return;
          }

          rawHtmlEl.value = html;
          const data = extract(html);
          render(data);
        } catch (err) {
          const empty = document.createElement("div");
          empty.className = "result-empty";
          empty.textContent = "読み取り失敗: " + err.message;
          resultEl.appendChild(empty);
        } finally {
          btn.disabled = false;
        }
      }

      document
        .getElementById("readBtn")
        .addEventListener("click", readClipboardHtml);
    </script>
  </body>
</html>
