<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamsMentionExtractor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1>TeamsMentionExtractor</h1>
        <p>Teams メンションの HTML から aria-label / type / mri 属性を抽出します。</p>
      </div>

      <div class="section-heading">使い方</div>
      <ol class="how-to">
        <li>Teams アプリでメンションを含むテキストを作成し、クリップボードにコピーする</li>
        <li>「クリップボードを解析」を押下する</li>
      </ol>

      <button id="readBtn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z" />
          <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z" />
        </svg>
        クリップボードを解析
      </button>

      <div class="section-heading">クリップボードから取得した HTML ソース</div>
      <textarea
        id="rawHtml"
        readonly
        placeholder="ボタンを押下すると、ここにクリップボードから取得した HTML が表示されます。"
      ></textarea>

      <div class="section-heading">MRI (Message Routing Identifier) 抽出結果</div>
      <div id="result"></div>

      <div id="note" hidden>
        <div class="copy-hint">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="#656d76" aria-hidden="true">
            <path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z" />
          </svg>
          各値はクリックでクリップボードにコピーされます
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
